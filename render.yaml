services:
  - type: web
    name: personalos-webhook
    runtime: python
    buildCommand: pip install fastapi uvicorn supabase requests toml
    startCommand: python -m uvicorn scripts.webhook:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false