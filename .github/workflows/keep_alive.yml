name: Keep Streamlit Apps Awake

on:
  schedule:
    # Runs every 10 hours
    - cron: "0 */10 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  ping-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Ping App 1
        run: |
          curl -s -o /dev/null -w "App 1 -> %{http_code}\n" https://personalos-3nehhfdyshqvahbazrn2lr.streamlit.app/ || true
